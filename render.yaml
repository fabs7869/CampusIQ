services:
  # ─── Unified API + Worker (100% Free Tier) ─────────────────────────────────
  - type: web
    name: campusiq-backend-unified
    env: python
    buildCommand: "./backend/start.sh"
    # Merged start command: starts API in foreground, background tasks in background process
    startCommand: "cd backend && (celery -A app.workers.worker worker --loglevel=info --concurrency=1 &) && gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        value: '["https://*.vercel.app", "http://localhost:3000"]'
      # MANUAL ENTRY: You will add these in the Render dashboard
      # - key: DATABASE_URL (from Supabase)
      # - key: REDIS_URL (from Upstash)
