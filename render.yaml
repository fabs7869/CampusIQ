services:
  # ─── Backend API ──────────────────────────────────────────────────────────
  - type: web
    name: campusiq-api
    env: python
    buildCommand: "./backend/start.sh"
    startCommand: "cd backend && gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campusiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: campusiq-redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        value: '["https://*.vercel.app", "http://localhost:3000"]'

  # ─── Celery Worker ────────────────────────────────────────────────────────
  - type: worker
    name: campusiq-worker
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && celery -A app.workers.worker worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campusiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: campusiq-redis
          property: connectionString

# ─── Database ────────────────────────────────────────────────────────────────
databases:
  - name: campusiq-db
    plan: free

# ─── Redis ───────────────────────────────────────────────────────────────────
redis:
  - name: campusiq-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
