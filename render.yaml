services:
  # ─── Unified API + Worker (100% Free Tier) ─────────────────────────────────
  - type: web
    name: campusiq-backend-unified
    env: python
    buildCommand: "pip install -r backend/requirements.txt --no-cache-dir"
    # Unified start command: runs migrations/seeding, then starts API + Worker
    startCommand: "bash ./backend/start.sh && cd backend && (celery -A app.workers.worker worker --loglevel=info --concurrency=1 &) && gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        value: '["https://*.vercel.app", "http://localhost:3000"]'
      # These will now appear in the Render UI for you to paste your URLs!
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
